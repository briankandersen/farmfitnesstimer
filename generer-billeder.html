    function downloadImage(width, height, filename, type) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      // Tegn din baggrundsfarve
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, width, height);

      const img = new Image();
      img.onload = () => {
        // Skalér logoet så det fylder ca. 80% af bredden/højden, så der er lidt luft i kanten
        const padding = 0.8;
        const scale = Math.min((width * padding) / img.width, (height * padding) / img.height);
        
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        
        // Centrer logoet på canvas
        const x = (width - drawW) / 2;
        const y = (height - drawH) / 2;

        ctx.drawImage(img, x, y, drawW, drawH);

        // Konverter canvas til en fil og start download
        const outUrl = canvas.toDataURL(type, 1.0);
        const a = document.createElement('a');
        a.download = filename;
        a.href = outUrl;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };
      
      img.src = svgBase64;
